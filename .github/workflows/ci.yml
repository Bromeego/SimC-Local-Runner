name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r app/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run interface tests
        run: node --test tests/test_app_js.mjs

      - name: Validate Compose configuration
        env:
          SIMC_WEB_ROOT: /tmp/simc-web
        run: |
          docker compose config --quiet
          docker compose -f compose.yaml -f compose.build.yaml config --quiet
          docker compose -f compose.yaml -f compose.bind.yaml config --quiet
          docker compose -f compose.yaml -f compose.bind.yaml -f compose.build.yaml config --quiet

      - name: Build web image
        run: docker build -t simc-web:test app
