<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111315">
  <title>{% block title %}SimulationCraft Local{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem("simc-theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.dataset.theme = savedTheme || systemTheme;
      } catch (_error) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}" aria-label="SimulationCraft home">
      <span class="brand-mark" aria-hidden="true">SC</span>
      <span>
        <strong>SimulationCraft</strong>
        <small>Local simulation runner</small>
      </span>
    </a>
    <button class="theme-toggle" id="theme-toggle" type="button">Theme</button>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <p>Runs on your Docker host. Profiles stay on your machine.</p>
  </footer>

  <script src="{{ url_for('static', filename='theme.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
